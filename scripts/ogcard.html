<!doctype html><html><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;overflow:hidden;font-family:'Space Grotesk',sans-serif;
  background:radial-gradient(120% 90% at 18% 8%,#e8902b22 0%,transparent 42%),
             radial-gradient(110% 80% at 88% 18%,#34467e55 0%,transparent 45%),
             radial-gradient(130% 100% at 50% 120%,#0b1d3a66 0%,transparent 55%),
             linear-gradient(180deg,#070707 0%,#0a0a12 100%);
  color:#e8ece4;position:relative}
.stars{position:absolute;inset:0;opacity:.5;
  background-image:radial-gradient(1.5px 1.5px at 12% 22%,#fff8,transparent),radial-gradient(1.5px 1.5px at 78% 16%,#fff6,transparent),radial-gradient(1.5px 1.5px at 35% 72%,#fff7,transparent),radial-gradient(1.5px 1.5px at 88% 64%,#fff5,transparent),radial-gradient(1.5px 1.5px at 58% 40%,#fff4,transparent);
  background-repeat:no-repeat}
.wrap{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:0 88px}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:.34em;text-transform:uppercase;color:#d2ab5b;margin-bottom:22px}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:#f4845f;margin-right:14px;box-shadow:0 0 14px #f4845f}
h1{font-family:'Anton',sans-serif;font-size:150px;line-height:.9;letter-spacing:.01em;
  background:linear-gradient(140deg,#fff 30%,#d2ab5b 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
.role{font-size:34px;color:#e8ece4cc;margin-top:24px;font-weight:500}
.tags{display:flex;gap:14px;margin-top:42px}
.tag{font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:.12em;text-transform:uppercase;
  color:#e8ece4aa;border:1px solid #ffffff22;background:#ffffff0a;border-radius:999px;padding:10px 20px}
.glow{position:absolute;right:-120px;top:50%;transform:translateY(-50%);width:560px;height:560px;border-radius:50%;
  background:radial-gradient(circle,#e8902b33 0%,transparent 65%);filter:blur(20px)}
</style></head>
<body>
  <div class="stars"></div>
  <div class="glow"></div>
  <div class="wrap">
    <div class="eyebrow"><span class="dot"></span>Portfolio · jandrosantos.dev</div>
    <h1>JANDRO<br>SANTOS</h1>
    <div class="role">Full-Stack Developer &amp; AI Engineer</div>
    <div class="tags"><span class="tag">React</span><span class="tag">AI · MCP</span><span class="tag">Frontend</span><span class="tag">Python</span></div>
  </div>
</body></html>
